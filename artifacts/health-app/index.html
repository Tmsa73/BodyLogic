<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Health & Fitness Tracker</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      html, body { margin: 0; padding: 0; background: #0a0a0b; color: #fafafa; font-family: 'Inter', system-ui, sans-serif; }
      #app-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 45%), #0a0a0b;
        z-index: 9999; transition: opacity 320ms ease;
      }
      #app-splash .splash-inner { display: flex; flex-direction: column; align-items: center; gap: 18px; }
      #app-splash .splash-logo {
        width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
        filter: drop-shadow(0 12px 40px rgba(34,197,94,0.45));
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      #app-splash .splash-logo img { width: 100%; height: 100%; object-fit: contain; }
      #app-splash .splash-text { font-size: 13px; font-weight: 600; color: #a1a1aa; letter-spacing: 0.04em; }
      #app-splash .splash-dots { display: flex; gap: 6px; }
      #app-splash .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #app-splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #app-splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 12px 40px rgba(34,197,94,0.35); }
        50% { transform: scale(1.06); box-shadow: 0 16px 48px rgba(34,197,94,0.55); }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-6px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash">
      <div class="splash-inner">
        <div class="splash-logo"><img src="/bodylogic-logo.png" alt="BodyLogic" /></div>
        <div class="splash-text">BodyLogic</div>
        <div class="splash-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
